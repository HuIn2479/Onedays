<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 - 服务器错误</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f8f9fa;
        color: #343a40;
        line-height: 1.6;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      h1 {
        font-size: 4rem;
        color: #dc3545;
        margin: 0;
      }

      p {
        font-size: 1.2rem;
        margin: 20px 0;
      }

      a {
        color: #007bff;
        text-decoration: none;
        border: 2px solid #007bff;
        padding: 10px 20px;
        border-radius: 5px;
        transition: all 0.3s;
      }

      a:hover {
        background: #007bff;
        color: white;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 3rem;
        }
        p {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>50X</h1>
      <p>服务器遇到意外错误</p>
      <p>我们正在努力修复这个问题，请稍后再试</p>
    </div>
  </body>
</html>
